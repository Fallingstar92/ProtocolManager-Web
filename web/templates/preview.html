{% extends "base.html" %}
{% block content %}
<section class="card preview-card">
    <div class="preview-header">
        <div>
            <h2>PŘEDÁVACÍ PROTOKOL č. {{ protocol.protocol_number }}</h2>
            <p>{{ protocol.customer_name }} · {{ protocol.date }}{% if protocol.jira %} · Jira: {{ protocol.jira }}{% endif %}</p>
        </div>
        <div class="actions compact">
            <a class="secondary-button" href="/">Zpět</a>
            <a class="primary-button" href="{{ pdf_url }}" target="_blank">Otevřít / vytisknout PDF</a>
        </div>
    </div>
    <iframe class="pdf-frame" src="{{ pdf_url }}" title="PDF náhled"></iframe>
</section>
{% endblock %}
